services:

  # ── SQL Server ───────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: housingerp_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD}
      MSSQL_PID: ${MSSQL_PID}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL",
        "/opt/mssql-tools18/bin/sqlcmd", "-S" , "localhost", "-U", "sa", "-P", "${SA_PASSWORD}", "-Q", "SELECT 1", "-C", "-b", "|| exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - housingerp_net
    restart: unless-stopped

  # ── DB Init (runs once, creates DB + tables, then exits) ────────────────────
  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: housingerp_sqlserver_init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./docker/init:/init:ro
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
    command: >
      bash -c '
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "${SA_PASSWORD}" -C -i /init/01_create_db.sql &&
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "${SA_PASSWORD}" -C -i /init/02_schemas.sql &&
        echo "All schemas applied."
      '
    networks:
      - housingerp_net
    restart: "no"

  # ── Python Chatbot Backend ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: housingerp_backend
    env_file:
      - ./backend/.env
    environment:
      SQLSERVER_CONN: ${SQLSERVER_CONN}
    ports:
      - "8000:8000"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - housingerp_net
    restart: unless-stopped

networks:
  housingerp_net:
    driver: bridge

volumes:
  sqlserver_data:
