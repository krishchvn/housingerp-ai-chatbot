services:
  - type: web
    name: housingerp-ai-backend
    env: python
    rootDir: backend
    buildCommand: pip3 install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false          # set to https://<frontend-name>.onrender.com after deploy
      - key: PYTHON_VERSION
        value: "3.11.0"

  - type: static
    name: housingerp-ai-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        sync: https://housingerp-ai-chatbot.onrender.com/
